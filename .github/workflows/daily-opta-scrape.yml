name: Daily Opta Scrape

on:
  schedule:
    # Run at 5 AM UTC daily (before Understat at 7 AM)
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      leagues:
        description: 'Leagues to scrape (space-separated, e.g., "EPL La_Liga")'
        required: false
        type: string
      seasons:
        description: 'Specific season name — overrides `recent`. Tournament names may contain spaces (e.g. "2022 Qatar" or "2020" for EURO 2020). One season per dispatch; run multiple times for multiple.'
        required: false
        type: string
      recent:
        description: 'Number of recent seasons to scrape per league (ignored if `seasons` is set)'
        required: false
        type: number
        default: 1
      tier:
        description: 'Max competition tier to scrape (1=Big5+UCL+WC+EURO, 2=+cups+secondary leagues, 0=all)'
        required: false
        type: number
        default: 2
      force_rescrape:
        description: 'Force rescrape existing matches'
        required: false
        type: boolean
        default: false
      scrape_timeout_minutes:
        description: 'Override the Run Opta scraper timeout (default 35; raise for full-catalog rebuilds)'
        required: false
        type: number
        default: 35

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: write

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
    - name: Checkout pannadata
      uses: actions/checkout@v6

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: scripts/opta/requirements.txt

    - name: Install Python dependencies
      run: pip install -r scripts/opta/requirements.txt

    - name: Download manifest from GitHub Releases
      run: |
        mkdir -p data
        echo "Downloading manifest..."
        if gh release download opta-latest --pattern "opta-manifest.parquet" --dir data/ 2>/dev/null; then
          echo "Downloaded opta-manifest.parquet"
          echo "Manifest size: $(ls -lh data/opta-manifest.parquet | awk '{print $5}')"
        else
          echo "No manifest found (first run or new setup)"
        fi
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Download existing per-league parquet files
      run: |
        mkdir -p data/opta/player_stats data/opta/shots data/opta/match_events data/opta/lineups data/opta/events data/opta/shot_events data/opta/fixtures
        echo "Downloading existing consolidated files..."

        # Download consolidated files (player_stats, shots, etc.) into data/opta/
        for file in opta_player_stats.parquet opta_shots.parquet opta_shot_events.parquet opta_events.parquet opta_lineups.parquet opta_fixtures.parquet; do
          if gh release download opta-latest --pattern "$file" --dir data/opta/ 2>/dev/null; then
            echo "Downloaded $file"
          fi
        done

        # Download per-league events files
        mkdir -p data/opta/events_consolidated
        for file in $(gh release view opta-latest --json assets -q '.assets[].name' 2>/dev/null | grep "^events_" || true); do
          if gh release download opta-latest --pattern "$file" --dir data/opta/events_consolidated/ 2>/dev/null; then
            echo "Downloaded $file"
          fi
        done

        echo "Download complete"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Run Opta scraper
      id: scrape
      # Normal daily runs are 10-18 min. Cap at 35 to catch hangs (Opta
      # rate-limiting backoff, reconcile-bug over-scraping) without waiting
      # for the overall 120-min job timeout to fire. Override via dispatch
      # input `scrape_timeout_minutes` if a legitimate full-catalog rebuild
      # needs longer.
      timeout-minutes: ${{ fromJson(github.event.inputs.scrape_timeout_minutes || '35') }}
      env:
        INPUT_LEAGUES: ${{ github.event.inputs.leagues }}
        INPUT_SEASONS: ${{ github.event.inputs.seasons }}
        INPUT_RECENT: ${{ github.event.inputs.recent || 1 }}
        INPUT_TIER: ${{ github.event.inputs.tier || 2 }}
        INPUT_FORCE: ${{ github.event.inputs.force_rescrape }}
      run: |
        cd scripts/opta
        ARGS="--recent $INPUT_RECENT"
        if [ "$INPUT_TIER" != "0" ]; then
          ARGS="$ARGS --tier $INPUT_TIER"
        fi
        if [ -n "$INPUT_LEAGUES" ]; then
          ARGS="$ARGS --leagues $INPUT_LEAGUES"
        fi
        if [ "$INPUT_FORCE" = "true" ]; then
          ARGS="$ARGS --force"
        fi
        # --seasons may contain spaces (tournament names like "2022 Qatar"),
        # so pass it as a quoted argument after the unquoted ARGS expansion.
        if [ -n "$INPUT_SEASONS" ]; then
          echo "Running: python scrape_opta.py $ARGS --seasons \"$INPUT_SEASONS\""
          python scrape_opta.py $ARGS --seasons "$INPUT_SEASONS"
        else
          echo "Running: python scrape_opta.py $ARGS"
          python scrape_opta.py $ARGS
        fi

    - name: Build consolidated parquet files
      env:
        INPUT_SEASONS: ${{ github.event.inputs.seasons }}
      run: |
        cd data
        # Count only raw per-league season files (not consolidated opta_*.parquet at the root)
        PARQUET_COUNT=$(find opta/player_stats opta/shots opta/lineups opta/events opta/shot_events opta/match_events opta/fixtures -name "*.parquet" 2>/dev/null | wc -l)
        echo "Raw per-league parquet files: $PARQUET_COUNT"
        if [ "$PARQUET_COUNT" -eq 0 ]; then
          # Distinguish "no new data" from "scraper crashed"
          if [ -f "../scripts/opta/data/scrape_summary.json" ]; then
            # Silent-empty guard: if the user dispatched with --seasons (targeted
            # a specific tournament/season) and zero new matches came back,
            # fail loudly rather than exit 0. A silent-success here hides real
            # bugs like the TOURNAMENT_DATE_EXCEPTIONS miss that wasted 20 min
            # thinking WC 2022 Qatar had landed when the wrong date window had
            # silently returned nothing.
            if [ -n "$INPUT_SEASONS" ]; then
              echo "::error::--seasons='$INPUT_SEASONS' dispatched but scraper returned zero new matches."
              echo "Likely causes:"
              echo "  1. Wrong date window for this tournament — add to TOURNAMENT_DATE_EXCEPTIONS in scrape_opta.py"
              echo "  2. All matches already in the manifest (try --force)"
              echo "  3. Season name mismatch with seasons.json"
              echo "  4. Upstream Opta API issue"
              exit 1
            fi
            echo "No new parquet files, but scraper ran successfully (no new matches)"
            exit 0
          else
            echo "ERROR: No parquet files AND no scrape summary - scraper may have crashed"
            exit 1
          fi
        fi

        # Snapshot existing event-consolidated mtimes BEFORE consolidate so
        # the upload step can later skip unchanged files (prevents the
        # concurrent-scrape race where one run overwrites another's uploads
        # of leagues it didn't touch).
        mkdir -p /tmp/scrape-state
        if [ -d "opta/events_consolidated" ]; then
          find opta/events_consolidated -name "events_*.parquet" \
            -printf "%f %T@\n" 2>/dev/null | sort > /tmp/scrape-state/pre_mtimes.txt
          echo "Snapshotted $(wc -l < /tmp/scrape-state/pre_mtimes.txt) existing events parquet mtimes"
        else
          touch /tmp/scrape-state/pre_mtimes.txt
        fi

        python ../scripts/opta/consolidate_opta.py

    - name: Setup R for xG enrichment
      uses: r-lib/actions/setup-r@v2
      with:
        use-public-rspm: true

    - name: Install R dependencies for xG
      uses: r-lib/actions/setup-r-dependencies@v2
      with:
        packages: |
          any::arrow
          any::dplyr
          any::xgboost

    - name: Enrich shots with xG
      continue-on-error: true
      run: |
        if [ -f data/opta/opta_shot_events.parquet ]; then
          mkdir -p source
          if gh release download models -p "xg_model.rds" -D source/; then
            Rscript scripts/enrich_shots_xg.R data/opta/opta_shot_events.parquet source/xg_model.rds
          else
            echo "::warning::xg_model.rds not available — shots will not include xG"
          fi
        else
          echo "::notice::No shot events file — skipping xG enrichment"
        fi
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload to GitHub Releases
      run: |
        cd data

        # Ensure release exists
        if ! gh release view opta-latest >/dev/null 2>&1; then
          gh release create opta-latest --title "Opta Data (Latest)" --notes "Automated daily Opta data scrape. Uses manifest-based incremental updates." --prerelease
        fi

        # Upload manifest (critical for incremental scraping)
        upload_errors=0
        if [ -f "opta-manifest.parquet" ]; then
          if gh release upload opta-latest opta-manifest.parquet --clobber; then
            echo "Uploaded opta-manifest.parquet ($(ls -lh opta-manifest.parquet | awk '{print $5}'))"
          else
            echo "CRITICAL: Failed to upload manifest. Next run will re-scrape all matches."
            upload_errors=$((upload_errors + 1))
          fi
        fi

        # Upload consolidated parquets (by table type)
        for f in opta/opta_*.parquet; do
          [ -f "$f" ] || continue
          if gh release upload opta-latest "$f" --clobber; then
            echo "Uploaded $(basename $f)"
          else
            echo "ERROR: Failed to upload $(basename $f)"
            upload_errors=$((upload_errors + 1))
          fi
        done

        # Upload data catalog
        if [ -f "opta/opta-catalog.json" ]; then
          if gh release upload opta-latest opta/opta-catalog.json --clobber; then
            echo "Uploaded opta-catalog.json"
          else
            echo "ERROR: Failed to upload opta-catalog.json"
            upload_errors=$((upload_errors + 1))
          fi
        fi

        # Upload per-league events files — but only those the consolidate
        # step actually modified. This prevents the concurrent-scrape race
        # condition where run A (scrapes WC) and run B (scrapes EURO) both
        # upload the full set of events_*.parquet files at the end, and
        # whichever finishes second silently overwrites the other's
        # modifications for leagues it didn't touch. Compare pre-consolidate
        # mtimes (snapshotted in the Build step) against current mtimes.
        if [ -d "opta/events_consolidated" ]; then
          PRE_MTIMES=/tmp/scrape-state/pre_mtimes.txt
          uploaded_count=0
          skipped_count=0
          for f in opta/events_consolidated/events_*.parquet; do
            [ -f "$f" ] || continue
            base=$(basename "$f")
            post_mtime=$(stat --printf "%Y" "$f")
            pre_mtime=""
            if [ -f "$PRE_MTIMES" ]; then
              pre_mtime=$(awk -v name="$base" '$1 == name {printf "%d", $2}' "$PRE_MTIMES")
            fi
            if [ -z "$pre_mtime" ] || [ "$pre_mtime" != "$post_mtime" ]; then
              if gh release upload opta-latest "$f" --clobber; then
                echo "Uploaded $base (modified this run)"
                uploaded_count=$((uploaded_count + 1))
              else
                echo "ERROR: Failed to upload $base"
                upload_errors=$((upload_errors + 1))
              fi
            else
              skipped_count=$((skipped_count + 1))
            fi
          done
          echo "Events files: $uploaded_count uploaded (modified), $skipped_count skipped (unchanged)"
        fi

        if [ "$upload_errors" -gt 0 ]; then
          echo "ERROR: $upload_errors upload(s) failed"
          exit 1
        fi
        echo "Upload complete"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Summary
      run: |
        echo "Daily Opta scrape completed"
        echo "Manifest: $(ls -lh data/opta-manifest.parquet 2>/dev/null | awk '{print $5}' || echo 'Not found')"
        echo "Raw parquet files: $(find data/opta -name '*.parquet' 2>/dev/null | wc -l)"
        echo "Consolidated by table:"
        ls -lh data/opta/opta_*.parquet 2>/dev/null || echo "  None"
        echo "Events by league: $(ls data/opta/events_consolidated/events_*.parquet 2>/dev/null | wc -l) files"

    # Recovery: if the scraper timed out or crashed mid-run, the happy-path
    # consolidate+upload steps are skipped — leaving the local runner with
    # newly-scraped per-match parquets and an updated manifest that will be
    # destroyed when the runner ends. This step salvages partial progress.
    #
    # Why this matters: scrape_opta.py writes the manifest incrementally
    # after each season (line ~920), so on a 35-min kill the local manifest
    # reflects all *completed* leagues. Without this step, the next day's
    # run downloads the SAME pre-failure manifest and re-scrapes everything
    # from there — creating a runaway backlog (one missed upload → tomorrow
    # has 1 more day of work → more likely to time out → 2 more days of
    # work, etc). Observed in the wild: 2026-04-22 → 2026-04-27, 6-day cascade.
    #
    # Safety: consolidate_opta.py dedups by match_id, so re-scraping any
    # partially-handled match later is harmless. Manifest + consolidated
    # parquets are uploaded *together* — never manifest alone, otherwise
    # the next run would skip matches whose data isn't in the release.
    - name: Recovery — consolidate and upload partial progress
      if: always() && steps.scrape.outcome == 'failure'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set +e
        cd data
        PARQUET_COUNT=$(find opta/player_stats opta/shots opta/lineups opta/events opta/shot_events opta/match_events opta/fixtures -name "*.parquet" 2>/dev/null | wc -l)
        if [ "$PARQUET_COUNT" -eq 0 ]; then
          echo "::notice::No partial parquets to recover — nothing to do"
          exit 0
        fi
        echo "::warning::Scraper failed mid-run. Recovering $PARQUET_COUNT per-match parquet files."

        # Snapshot pre-consolidate mtimes for the events skip-unchanged check
        mkdir -p /tmp/scrape-state
        if [ -d "opta/events_consolidated" ]; then
          find opta/events_consolidated -name "events_*.parquet" \
            -printf "%f %T@\n" 2>/dev/null | sort > /tmp/scrape-state/pre_mtimes.txt
        else
          touch /tmp/scrape-state/pre_mtimes.txt
        fi

        # Best-effort consolidate. Failure here is non-fatal — we still want
        # to upload the manifest so completed seasons aren't re-scraped.
        python ../scripts/opta/consolidate_opta.py
        consolidate_status=$?
        if [ "$consolidate_status" -ne 0 ]; then
          echo "::warning::Consolidator exited $consolidate_status — uploading whatever was produced"
        fi

        # Upload manifest first (most critical — tracks completed seasons)
        if [ -f "opta-manifest.parquet" ]; then
          if gh release upload opta-latest opta-manifest.parquet --clobber; then
            echo "✅ Recovered opta-manifest.parquet"
          else
            echo "::error::Failed to upload recovery manifest — completed seasons will be re-scraped"
          fi
        fi

        # Upload any consolidated table-level parquets that exist
        for f in opta/opta_*.parquet; do
          [ -f "$f" ] || continue
          gh release upload opta-latest "$f" --clobber \
            && echo "✅ Recovered $(basename $f)" \
            || echo "::warning::Failed to upload $(basename $f)"
        done

        # Per-league events files — only those modified during recovery
        PRE_MTIMES=/tmp/scrape-state/pre_mtimes.txt
        if [ -d "opta/events_consolidated" ]; then
          for f in opta/events_consolidated/events_*.parquet; do
            [ -f "$f" ] || continue
            base=$(basename "$f")
            post_mtime=$(stat --printf "%Y" "$f")
            pre_mtime=$(awk -v name="$base" '$1 == name {printf "%d", $2}' "$PRE_MTIMES")
            if [ -z "$pre_mtime" ] || [ "$pre_mtime" != "$post_mtime" ]; then
              gh release upload opta-latest "$f" --clobber \
                && echo "✅ Recovered $base" \
                || echo "::warning::Failed to upload $base"
            fi
          done
        fi

        # Catalog (if produced)
        if [ -f "opta/opta-catalog.json" ]; then
          gh release upload opta-latest opta/opta-catalog.json --clobber \
            && echo "✅ Recovered opta-catalog.json" \
            || echo "::warning::Failed to upload opta-catalog.json"
        fi

        echo "::notice::Recovery complete — next run will resume from this checkpoint"

    # panna's predictions-pipeline.yml listens for this event and regenerates
    # match_predictions.parquet + season_standings.parquet on blog-latest.
    # Without this dispatch, predictions only ran on its weekly cron (see
    # `panna/.github/workflows/predictions-pipeline.yml`), so blog sim
    # standings could be 5-6 days stale. WORKFLOW_PAT is a cross-repo PAT with
    # workflow scope (already configured for the reverse direction in
    # predictions-pipeline.yml). See pannadata#28 / inthegame-blog#189.
    - name: Trigger panna predictions pipeline
      if: success()
      env:
        GH_TOKEN: ${{ secrets.WORKFLOW_PAT }}
      run: |
        if [ -z "$GH_TOKEN" ]; then
          echo "::warning::WORKFLOW_PAT secret not set — predictions pipeline will not auto-run."
          exit 0
        fi
        # Retry transient GitHub API failures (rate limit, 5xx) before giving
        # up — a missed dispatch means waiting for the weekly cron to refresh.
        for attempt in 1 2 3; do
          if gh api repos/peteowen1/panna/dispatches \
               -f event_type=opta-scrape-complete; then
            echo "Dispatched opta-scrape-complete to panna (attempt $attempt)"
            exit 0
          fi
          echo "::warning::Dispatch attempt $attempt failed"
          [ "$attempt" -lt 3 ] && sleep $((attempt * 10))
        done
        echo "::error::Failed to dispatch opta-scrape-complete after 3 attempts"
        exit 1
