name: Build blog data

on:
  workflow_dispatch:
  repository_dispatch:
    types: [predictions-complete]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download blog data
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p blog
          gh release download blog-latest -p "panna_ratings.parquet" -D blog/
          gh release download blog-latest -p "match_predictions.parquet" -D blog/
          echo "Downloaded blog data:"
          ls -lh blog/

      - name: Upload to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_R2_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install -g wrangler
          if ! ls blog/*.parquet 1>/dev/null 2>&1; then
            echo "ERROR: No parquet files found in blog/"
            exit 1
          fi
          upload_errors=0
          for f in blog/*.parquet; do
            if wrangler r2 object put "inthegame-data/$(basename $f)" --file "$f" --remote; then
              echo "Uploaded $(basename $f)"
            else
              echo "ERROR: Failed to upload $(basename $f)"
              upload_errors=$((upload_errors + 1))
            fi
          done
          if [ "$upload_errors" -gt 0 ]; then
            echo "ERROR: $upload_errors upload(s) failed"
            exit 1
          fi
