name: Build blog data

on:
  workflow_dispatch:
  repository_dispatch:
    types: [predictions-complete]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    # The chains step builds ~14 comps serially at ~4-6 min each once the loop
    # is healthy — 30 min only ever fit because the loop was crashing at comp 2
    # (see build_chains_ci.R per-comp tryCatch note). A timeout mid-chains kills
    # the job BEFORE the R2 upload step, shipping nothing at all.
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::arrow
            any::dplyr
            any::tidyr
            any::xgboost
            any::jsonlite

      - name: Download source data
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p blog source

          # Source ratings + metadata (for build_blog_data.R enrichment)
          gh release download ratings-data -p "seasonal_xrapm.parquet" -D source/ || { echo "ERROR: Failed to download seasonal_xrapm.parquet"; exit 1; }
          gh release download ratings-data -p "seasonal_spm.parquet" -D source/ || { echo "ERROR: Failed to download seasonal_spm.parquet"; exit 1; }
          gh release download ratings-data -p "player_metadata.parquet" -D source/ || { echo "ERROR: Failed to download player_metadata.parquet"; exit 1; }
          gh release download ratings-data -p "career_panna.parquet" -D source/ || { echo "ERROR: Failed to download career_panna.parquet"; exit 1; }

          # Match predictions (pass through from blog-latest → renamed to predictions.parquet)
          gh release download blog-latest -p "match_predictions.parquet" -D blog/ || { echo "ERROR: Failed to download match_predictions.parquet from blog-latest"; exit 1; }
          mv blog/match_predictions.parquet blog/predictions.parquet

          # Season standings (for simulation script — optional)
          if gh release download blog-latest -p "season_standings.parquet" -D blog/; then
            echo "Downloaded season_standings.parquet"
          else
            echo "::warning::season_standings.parquet not available — simulations will lack current standings"
          fi

          # Game logs (per-match player value metrics — optional, pass through to R2).
          #
          # Two shapes ship to R2:
          #   football/game-logs.parquet          → current-season alias, the
          #     fast default the blog loads on EVERY player-stats page view.
          #   football/game-logs-<season>.parquet → one file per historical
          #     season, fetched on-demand only when a non-current season is
          #     picked in the Value tab. Kept per-season (NOT concatenated) so
          #     each fetch stays ~6MB; a merged ~60MB file would be a 10x
          #     page-load regression on the default view.
          if gh release download blog-latest -p "game_logs.parquet" -D blog/; then
            mv blog/game_logs.parquet blog/game-logs.parquet
            echo "Downloaded game-logs.parquet (current-season default)"
          else
            echo "::warning::game_logs.parquet not available — Value tab will be empty"
          fi

          # Per-season historical files (game_logs_<season>.parquet). The glob
          # excludes the alias above (it has no _<season> suffix), so there's no
          # double-download. Each is renamed game-logs-<season>.parquet so the
          # R2 upload loop ships it to football/game-logs-<season>.parquet
          # verbatim. Glob-style download mirrors action_wpa_*.parquet below.
          GL_SEASONS=0
          if gh release download blog-latest -p "game_logs_*.parquet" -D blog/; then
            for f in blog/game_logs_*.parquet; do
              [ -e "$f" ] || continue
              season=${f#blog/game_logs_}        # -> 2024-2025.parquet
              mv "$f" "blog/game-logs-${season}"
              GL_SEASONS=$((GL_SEASONS + 1))
            done
            echo "Downloaded $GL_SEASONS per-season game-logs file(s)"
          else
            echo "::warning::No per-season game_logs_*.parquet on blog-latest — historical Value tab will be empty"
          fi

          # Shootout WPA (per-player penalty-shootout win-prob-added — optional).
          # Pass straight through to R2 as football/shootout-wpa.parquet for the
          # blog. Thin data (~1 kick/player) so it's a small file; absent for
          # seasons with no shootouts in blog comps.
          if gh release download blog-latest -p "shootout_wpa.parquet" -D blog/; then
            mv blog/shootout_wpa.parquet blog/shootout-wpa.parquet
            echo "Downloaded shootout-wpa.parquet"
          else
            echo "::notice::shootout_wpa.parquet not available — shootout WPA absent (no shootouts yet, or step 10d not run)"
          fi

          # Action equity (per-action EPV credit — optional, used by chain builder)
          if gh release download blog-latest -p "action_equity.parquet" -D source/; then
            echo "Downloaded action_equity.parquet"
          else
            echo "::warning::action_equity.parquet not available — chains will lack equity"
          fi

          # World Cup 2026 blog data (panna step 12 → blog-latest). Optional —
          # passed straight through to R2 football/ for the blog's WC section.
          for wcf in wc2026_predictions wc2026_simulation wc2026_groups wc2026_team_strength wc2026_squads wc2026_knockout_probs; do
            if gh release download blog-latest -p "${wcf}.parquet" -D blog/; then
              echo "Downloaded ${wcf}.parquet"
            else
              echo "::warning::${wcf}.parquet not available — WC section will be stale"
            fi
          done

          # Action WPA (per-action win-probability-added — optional, used by
          # chain builder for blog match-page WPA without worker calls).
          # Sharded per league-season as action_wpa_<league>_<season>.parquet
          # by panna's 06_calculate_wpa.R. Glob-style download — no failure
          # if absent (chain builder falls back gracefully).
          WPA_COUNT=0
          if gh release download opta-latest -p "action_wpa_*.parquet" -D source/ 2>/dev/null; then
            WPA_COUNT=$(ls source/action_wpa_*.parquet 2>/dev/null | wc -l)
            echo "Downloaded $WPA_COUNT action_wpa_*.parquet shard(s)"
          else
            echo "::warning::No action_wpa_*.parquet shards on opta-latest — chains will lack per-action WPA"
          fi

          # Opta shot events (optional — doesn't fail build)
          if gh release download opta-latest -p "opta_shot_events.parquet" -D source/; then
            echo "Downloaded opta_shot_events.parquet"
          else
            echo "::warning::No opta shot events available, shot charts will be skipped"
          fi

          # Opta lineups (63MB — for match-shots team resolution)
          if gh release download opta-latest -p "opta_lineups.parquet" -D source/; then
            echo "Downloaded opta_lineups.parquet"
          else
            echo "::warning::opta_lineups.parquet not available — match-shots will lack team names"
          fi

          # Per-player EPR + PSR weekly snapshots (optional — feed the blog's
          # "Piero" composite player rating in ratings.parquet). build_blog_data.R
          # takes the latest snapshot per player and joins on the dedup key;
          # absent files just leave epr/psr NA (Piero falls back to panna).
          if gh release download opta-latest -p "opta_epr_weekly.parquet" -D source/; then
            echo "Downloaded opta_epr_weekly.parquet"
          else
            echo "::warning::opta_epr_weekly.parquet not available — Piero's EPR component will be NA"
          fi
          if gh release download opta-latest -p "opta_psr_weekly.parquet" -D source/; then
            echo "Downloaded opta_psr_weekly.parquet"
          else
            echo "::warning::opta_psr_weekly.parquet not available — Piero's PSR component will be NA"
          fi

          # NOTE: opta_player_stats.parquet (247MB) and opta_xmetrics.parquet (10MB) are
          # downloaded lazily by their respective steps to reduce peak memory usage.

          # Per-league event files downloaded on-demand by build_chains_ci.R

          echo "Downloaded source data:"
          ls -lh blog/ source/

      - name: Enrich shot xG (belt-and-suspenders — re-run if upstream is stale)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f source/opta_shot_events.parquet ]; then
            echo "::notice::No opta_shot_events.parquet — skipping xG enrichment"
            exit 0
          fi

          # Guard against the failure mode where a manual upload to opta-latest
          # replaced the enriched file with an un-enriched one (ships ~99% NaN
          # xG to the blog). daily-opta-scrape.yml runs enrich_shots_xg.R too,
          # but a local scrape + manual upload can bypass it.
          #
          # If this step fires: check opta-latest asset `updatedAt` timestamps
          # (`gh release view opta-latest -R peteowen1/pannadata --json assets`)
          # — a manual upload likely clobbered the enriched file. Fix upstream
          # by re-running daily-opta-scrape.yml or re-uploading enriched output;
          # this step is a safety net, not the source of truth.
          #
          # Probe reads xG NaN rate on the most recent season (derived from the
          # data, not hardcoded, so the check doesn't rot at season rollover).
          # Any Rscript error path returns 100 so we fail-closed: treat failures
          # to measure as "broken" and force re-enrichment rather than silently
          # skip (the whole point of this guard is catching silent failure).
          NAN_PCT=$(Rscript -e '
            suppressMessages({ library(arrow); library(dplyr) })
            tryCatch({
              s <- read_parquet("source/opta_shot_events.parquet")
              if (!"xg"     %in% names(s)) { cat(100); quit() }
              if (!"season" %in% names(s)) { cat(100); quit() }
              latest <- max(s$season, na.rm = TRUE)
              recent <- s |> filter(season == latest)
              if (nrow(recent) == 0)       { cat(100); quit() }
              cat(round(100 * mean(is.na(recent$xg))))
            }, error = function(e) { cat(100) })
          ' 2>/dev/null | tr -dc '0-9')
          [ -z "$NAN_PCT" ] && NAN_PCT=100
          echo "Upstream xG NaN rate on latest season: ${NAN_PCT}%"

          # Threshold 50: healthy enriched data is <5% NaN on any season; a
          # clobbered un-enriched file is ~99%. 50 is the safe midpoint — won't
          # trip on transient partial-enrichment but reliably catches the
          # clobber case.
          if [ "$NAN_PCT" -lt "50" ]; then
            echo "xG coverage is healthy — skipping re-enrichment"
            exit 0
          fi

          echo "::warning::xG coverage is broken (${NAN_PCT}% NaN on latest season) — re-running enrichment"
          if ! gh release download models -p "xg_model.rds" -D source/; then
            echo "::error::xg_model.rds unavailable from models release AND upstream is broken (${NAN_PCT}% NaN). Blog will ship with broken xG until upstream is fixed."
            exit 1
          fi

          Rscript scripts/enrich_shots_xg.R source/opta_shot_events.parquet source/xg_model.rds

          # Post-enrichment verification: catch model/schema drift where
          # predict() produces garbage or still-NaN values on the current shot
          # format. If still > 10% NaN, the enrichment didn't actually fix it.
          POST_NAN=$(Rscript -e '
            suppressMessages({ library(arrow); library(dplyr) })
            tryCatch({
              s <- read_parquet("source/opta_shot_events.parquet")
              latest <- max(s$season, na.rm = TRUE)
              recent <- s |> filter(season == latest)
              if (nrow(recent) == 0) { cat(100); quit() }
              cat(round(100 * mean(is.na(recent$xg))))
            }, error = function(e) { cat(100) })
          ' 2>/dev/null | tr -dc '0-9')
          [ -z "$POST_NAN" ] && POST_NAN=100
          if [ "$POST_NAN" -gt "10" ]; then
            echo "::error::Post-enrichment NaN still ${POST_NAN}% — enrichment did not fix the problem. Likely model/schema drift in xg_model.rds vs shot columns."
            exit 1
          fi
          echo "Post-enrichment NaN rate: ${POST_NAN}% (healthy)"

      - name: Build ratings parquet
        run: Rscript scripts/build_blog_data.R

      # Attach the pool-independent `piero` column to the WC squads parquet
      # (downloaded as a pass-through from panna step 12). Runs AFTER the ratings
      # build because it LEFT JOINs piero from blog/ratings.parquet and reuses
      # blog/piero_reference.json for the rare squad players absent from ratings.
      # Both files are written by build_blog_data.R above. See
      # scripts/enrich_squads_piero.R and PIERO-POOL-INDEPENDENCE.md.
      - name: Enrich WC squads with Piero
        continue-on-error: true
        run: |
          if [ -f blog/wc2026_squads.parquet ]; then
            Rscript scripts/enrich_squads_piero.R
          else
            echo "::notice::Skipping squad Piero — wc2026_squads.parquet not downloaded"
          fi

      - name: Build player details parquet
        continue-on-error: true
        run: |
          if [ -f source/opta_lineups.parquet ]; then
            Rscript scripts/build_player_meta.R
          else
            echo "::notice::Skipping player details — lineups file not available"
          fi

      - name: Build shot parquet
        run: |
          if [ -f source/opta_shot_events.parquet ]; then
            if ! Rscript scripts/build_shot_data.R; then
              echo "::warning::Shot data build failed, continuing without shot charts"
            fi
          else
            echo "::notice::Skipping shot data — source file not available"
          fi

      - name: Download and filter player skills
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release download opta-latest -p "opta_skills.parquet" -D source/; then
            Rscript -e '
              library(arrow)
              library(dplyr)
              df <- read_parquet("source/opta_skills.parquet")
              latest <- df |> filter(season_end_year == max(season_end_year))
              if (nrow(latest) == 0) stop("Filter produced 0 rows -- aborting")
              write_parquet(latest, "blog/player-skills.parquet")
              cat(sprintf("Filtered to season %d: %d players\n", max(df$season_end_year), nrow(latest)))
            '
          else
            echo "::warning::opta_skills.parquet not available — player skills won't update"
          fi

      - name: Build match-shots (xG from enriched source)
        continue-on-error: true
        run: |
          if [ -f source/opta_shot_events.parquet ]; then
            Rscript -e '
              library(arrow); library(dplyr)
              source("scripts/league_config.R")
              # BLOG_SHOT_COMPS = BLOG_COMPS + World_Cup, so finished WC matches
              # carry shot-level xG into match-shots.parquet (and thence into
              # predictions xg_home/xg_away). WC is intentionally not in
              # BLOG_COMPS — see league_config.R.
              shots <- read_parquet("source/opta_shot_events.parquet") |> filter(competition %in% BLOG_SHOT_COMPS)
              has_xg <- "xg" %in% names(shots)
              cat("Source has xG:", has_xg, "\n")
              # Team names from lineups
              if (file.exists("source/opta_lineups.parquet")) {
                lu <- read_parquet("source/opta_lineups.parquet", col_select=c("match_id","player_id","team_id","team_name"))
                pt <- lu |> distinct(match_id, player_id, team_id, team_name) |> rename(lu_tid=team_id, lu_tn=team_name)
                shots <- shots |> left_join(pt, by=c("match_id","player_id"))
              }
              ms <- shots |> transmute(match_id,
                team_id = if ("lu_tid" %in% names(shots)) coalesce(team_id, lu_tid) else team_id,
                team_name = if ("lu_tn" %in% names(shots)) lu_tn else NA_character_,
                player_name, minute = as.integer(minute), second = as.integer(coalesce(second, 0)),
                x = round(x, 1), y = round(y, 1), type_id = as.integer(type_id),
                is_goal = type_id == 16L,
                situation = if ("situation" %in% names(shots)) as.character(situation) else NA_character_,
                body_part = if ("body_part" %in% names(shots)) as.character(body_part) else NA_character_,
                xg = if (has_xg) round(xg, 3) else NA_real_) |>
                filter(!is.na(match_id)) |> arrange(match_id, minute, second)
              write_parquet(ms, "blog/match-shots.parquet")
              cat("match-shots:", nrow(ms), "shots", if(has_xg) "with xG" else "(no xG)", "\n")
            '
          else
            echo "::notice::Skipping match-shots — source file not available"
          fi

      - name: Build match-stats per league
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Download on-demand to reduce peak memory (247MB file)
          if gh release download opta-latest -p "opta_player_stats.parquet" -D source/; then
            Rscript scripts/rebuild_match_stats.R
            rm -f source/opta_player_stats.parquet  # free disk for chains
          else
            echo "::notice::Skipping match-stats — source file not available"
          fi

      - name: Build league xG from match-shots
        continue-on-error: true
        run: |
          if [ -f blog/match-shots.parquet ]; then
            Rscript -e '
              library(arrow); library(dplyr)
              source("scripts/league_config.R")
              ms <- read_parquet("blog/match-shots.parquet")
              if (!"xg" %in% names(ms) || all(is.na(ms$xg))) {
                cat("No xG in match-shots — skipping league-xg\n"); q()
              }
              # Read match-stats per league for match_id → league/season mapping
              codes <- BLOG_CODES
              meta <- list()
              for (code in codes) {
                f <- paste0("blog/match-stats-", code, ".parquet")
                if (file.exists(f)) {
                  meta[[code]] <- read_parquet(f, col_select=c("match_id","league","season")) |>
                    distinct(match_id, league, season)
                }
              }
              meta <- bind_rows(meta)
              tmx <- ms |> filter(!is.na(xg)) |> inner_join(meta, by="match_id") |>
                group_by(match_id, league, season, team_name) |>
                summarise(xgf=sum(xg, na.rm=TRUE), .groups="drop") |>
                group_by(match_id) |> mutate(xga=sum(xgf)-xgf) |> ungroup()
              lxg <- tmx |> group_by(league, season, team_name) |>
                summarise(matches=n(), xgf=round(sum(xgf),1), xga=round(sum(xga),1),
                  xgd=round(sum(xgf)-sum(xga),1), .groups="drop")
              latest <- lxg |> group_by(league) |> filter(season==max(season)) |>
                ungroup() |> arrange(league, desc(xgd))
              write_parquet(latest, "blog/league-xg.parquet")
              cat("league-xg:", nrow(latest), "rows from per-match xG\n")
            '
          else
            echo "::notice::Skipping league-xg — match-shots not available"
          fi

      - name: Enrich predictions with match-level xG
        continue-on-error: true
        run: |
          if [ -f blog/match-shots.parquet ] && [ -f blog/predictions.parquet ]; then
            Rscript -e '
              library(arrow); library(dplyr)
              source("scripts/league_config.R")
              ms <- read_parquet("blog/match-shots.parquet")
              if (!"xg" %in% names(ms) || all(is.na(ms$xg))) {
                cat("No xG in match-shots — skipping predictions enrichment\n"); q()
              }
              # Per-match, per-team xG totals
              team_xg <- ms |> filter(!is.na(xg)) |>
                group_by(match_id, team_id) |>
                summarise(xg = round(sum(xg, na.rm = TRUE), 2), .groups = "drop")
              # Home/away (team_position) per (match_id, team_id). Prefer
              # opta_lineups.parquet: it covers EVERY scraped competition,
              # including the World Cup, whereas the per-league
              # match-stats-<code>.parquet files only exist for BLOG_CODES (no
              # WC file → WC matches would be dropped by the inner_join and
              # stay xG-NULL). Fall back to match-stats if lineups is absent.
              pos <- NULL
              lu_path <- "source/opta_lineups.parquet"
              if (file.exists(lu_path)) {
                pos <- read_parquet(lu_path, col_select = c("match_id","team_id","team_position")) |>
                  distinct(match_id, team_id, team_position)
              }
              if (is.null(pos) || nrow(pos) == 0) {
                codes <- BLOG_CODES
                pos_list <- list()
                for (code in codes) {
                  f <- paste0("blog/match-stats-", code, ".parquet")
                  if (file.exists(f)) {
                    pos_list[[code]] <- read_parquet(f, col_select = c("match_id","team_id","team_position")) |>
                      distinct(match_id, team_id, team_position)
                  }
                }
                pos <- bind_rows(pos_list)
              }
              # Pivot to one row per match: xg_home, xg_away
              match_xg <- team_xg |>
                inner_join(pos, by = c("match_id", "team_id")) |>
                filter(team_position %in% c("home", "away")) |>
                tidyr::pivot_wider(id_cols = match_id, names_from = team_position,
                  values_from = xg, names_prefix = "xg_")
              # Enrich predictions
              pred <- read_parquet("blog/predictions.parquet")
              pred_enriched <- pred |>
                left_join(match_xg |> select(match_id, xg_home, xg_away), by = "match_id")
              write_parquet(pred_enriched, "blog/predictions.parquet")
              n_xg <- sum(!is.na(pred_enriched$xg_home))
              cat("predictions enriched:", n_xg, "/", nrow(pred_enriched), "matches have xG\n")
            '
          else
            echo "::notice::Skipping predictions xG enrichment — required files not available"
          fi

      - name: Build chain parquets (one league at a time)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f source/opta_lineups.parquet ]; then
            Rscript scripts/build_chains_ci.R
          else
            echo "::notice::Skipping chains — lineups file not available"
          fi

      # blog#257: derive detailed positions (LB/CB/RB/LM/CM/RM/LW/RW) from
      # chain x/y averages. Runs AFTER build_chains_ci.R because it consumes
      # blog/chains-{CODE}.parquet. Self-downloads opta_player_stats.parquet
      # because the earlier `Build match-stats per league` step deletes it
      # for memory reasons, and we need it back for opta_position mode per
      # (player, season). Lightweight final output (<200k rows, few MB)
      # so it's cheap to add to every weekly build.
      - name: Build player-positions parquet (detailed pos for blog filter)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! ls blog/chains-*.parquet 1>/dev/null 2>&1; then
            echo "::warning::Skipping player-positions — no chains-*.parquet built upstream"
            exit 0
          fi
          # Re-download opta_player_stats.parquet (deleted by the earlier
          # `Build match-stats per league` step to free disk). Need it
          # back for opta_position mode.
          if [ ! -f source/opta_player_stats.parquet ]; then
            if ! gh release download opta-latest -p "opta_player_stats.parquet" -D source/; then
              echo "::warning::Skipping player-positions — opta_player_stats.parquet not available"
              exit 0
            fi
          fi
          Rscript scripts/build_player_positions.R
          # Sanity check — verify the script actually produced the output.
          # The R script has `quit(status = 0)` paths for missing inputs,
          # which combined with continue-on-error would otherwise silently
          # skip the upload.
          if [ ! -f blog/player-positions.parquet ]; then
            echo "::warning::player-positions.parquet not produced — script aborted silently"
            exit 0
          fi
          echo "Built blog/player-positions.parquet ($(stat -c %s blog/player-positions.parquet) bytes)"

      - name: Simulate domestic seasons
        continue-on-error: true
        run: |
          if [ -f blog/predictions.parquet ]; then
            Rscript scripts/simulate_season.R
          else
            echo "::notice::Skipping domestic simulations — predictions not available"
          fi

      - name: Simulate cup competitions (UCL/UEL/UECL)
        continue-on-error: true
        run: |
          if [ -f blog/predictions.parquet ]; then
            Rscript scripts/simulate_cup.R
          else
            echo "::notice::Skipping cup simulations — predictions not available"
          fi

      - name: Upload to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_R2_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install -g wrangler
          if ! ls blog/*.parquet 1>/dev/null 2>&1; then
            echo "ERROR: No parquet files found in blog/"
            exit 1
          fi
          upload_errors=0
          for f in blog/*.parquet; do
            if wrangler r2 object put "inthegame-data/football/$(basename $f)" --file "$f" --remote; then
              echo "Uploaded football/$(basename $f)"
            else
              echo "ERROR: Failed to upload football/$(basename $f)"
              upload_errors=$((upload_errors + 1))
            fi
          done
          if [ "$upload_errors" -gt 0 ]; then
            echo "ERROR: $upload_errors upload(s) failed"
            exit 1
          fi

      # The chains step runs with continue-on-error so the R2 upload still
      # ships healthy comps — but that keeps the run green even when comps
      # fail every week (stale chains on R2 with zero red signal). This step
      # runs AFTER the upload and turns the run red if build_chains_ci.R
      # recorded any per-comp failures.
      - name: Fail run if chains had per-comp failures
        run: |
          if [ -f chains_failures.txt ]; then
            echo "::error::build_chains_ci.R recorded per-comp failures (healthy comps were still uploaded to R2):"
            cat chains_failures.txt
            exit 1
          fi
