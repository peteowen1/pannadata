name: Build blog data

on:
  workflow_dispatch:
  # Uncomment to trigger after the panna model pipeline uploads ratings:
  # release:
  #   types: [published, edited]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: arrow, dplyr

      - name: Download source data
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p source
          gh release download ratings-data -p "seasonal_xrapm.parquet" -D source
          gh release download ratings-data -p "seasonal_spm.parquet" -D source
          gh release download ratings-data -p "player_metadata.parquet" -D source

      - name: Aggregate
        run: Rscript scripts/build_blog_data.R

      - name: Upload to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_R2_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install -g wrangler
          if ! ls blog/*.parquet 1>/dev/null 2>&1; then
            echo "ERROR: No parquet files found in blog/"
            exit 1
          fi
          upload_errors=0
          for f in blog/*.parquet; do
            if wrangler r2 object put "inthegame-data/$(basename $f)" --file "$f" --remote; then
              echo "Uploaded $(basename $f)"
            else
              echo "ERROR: Failed to upload $(basename $f)"
              upload_errors=$((upload_errors + 1))
            fi
          done
          if [ "$upload_errors" -gt 0 ]; then
            echo "ERROR: $upload_errors upload(s) failed"
            exit 1
          fi
