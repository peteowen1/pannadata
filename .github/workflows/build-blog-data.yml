name: Build blog data

on:
  workflow_dispatch:
  repository_dispatch:
    types: [predictions-complete]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::arrow
            any::dplyr
            any::tidyr

      - name: Download source data
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p blog source

          # Source ratings + metadata (for build_blog_data.R enrichment)
          gh release download ratings-data -p "seasonal_xrapm.parquet" -D source/ || { echo "ERROR: Failed to download seasonal_xrapm.parquet"; exit 1; }
          gh release download ratings-data -p "seasonal_spm.parquet" -D source/ || { echo "ERROR: Failed to download seasonal_spm.parquet"; exit 1; }
          gh release download ratings-data -p "player_metadata.parquet" -D source/ || { echo "ERROR: Failed to download player_metadata.parquet"; exit 1; }

          # Match predictions (pass through from blog-latest → renamed to predictions.parquet)
          gh release download blog-latest -p "match_predictions.parquet" -D blog/ || { echo "ERROR: Failed to download match_predictions.parquet from blog-latest"; exit 1; }
          mv blog/match_predictions.parquet blog/predictions.parquet

          # Season standings (for simulation script — optional)
          if gh release download blog-latest -p "season_standings.parquet" -D blog/; then
            echo "Downloaded season_standings.parquet"
          else
            echo "::warning::season_standings.parquet not available — simulations will lack current standings"
          fi

          # Game logs (per-match player value metrics — optional, pass through to R2)
          if gh release download blog-latest -p "game_logs.parquet" -D blog/; then
            mv blog/game_logs.parquet blog/game-logs.parquet
            echo "Downloaded game-logs.parquet"
          else
            echo "::warning::game_logs.parquet not available — Value tab will be empty"
          fi

          # Action equity (per-action EPV credit — optional, used by chain builder)
          if gh release download blog-latest -p "action_equity.parquet" -D source/; then
            echo "Downloaded action_equity.parquet"
          else
            echo "::warning::action_equity.parquet not available — chains will lack equity"
          fi

          # Opta shot events (optional — doesn't fail build)
          if gh release download opta-latest -p "opta_shot_events.parquet" -D source/; then
            echo "Downloaded opta_shot_events.parquet"
          else
            echo "::warning::No opta shot events available, shot charts will be skipped"
          fi

          # Opta lineups (63MB — for match-shots team resolution)
          if gh release download opta-latest -p "opta_lineups.parquet" -D source/; then
            echo "Downloaded opta_lineups.parquet"
          else
            echo "::warning::opta_lineups.parquet not available — match-shots will lack team names"
          fi

          # NOTE: opta_player_stats.parquet (247MB) and opta_xmetrics.parquet (10MB) are
          # downloaded lazily by their respective steps to reduce peak memory usage.

          # Per-league event files downloaded on-demand by build_chains_ci.R

          echo "Downloaded source data:"
          ls -lh blog/ source/

      - name: Build ratings parquet
        run: Rscript scripts/build_blog_data.R

      - name: Build player details parquet
        continue-on-error: true
        run: |
          if [ -f source/opta_lineups.parquet ]; then
            Rscript scripts/build_player_meta.R
          else
            echo "::notice::Skipping player details — lineups file not available"
          fi

      - name: Build shot parquet
        run: |
          if [ -f source/opta_shot_events.parquet ]; then
            if ! Rscript scripts/build_shot_data.R; then
              echo "::warning::Shot data build failed, continuing without shot charts"
            fi
          else
            echo "::notice::Skipping shot data — source file not available"
          fi

      - name: Download and filter player skills
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release download opta-latest -p "opta_skills.parquet" -D source/; then
            Rscript -e '
              library(arrow)
              library(dplyr)
              df <- read_parquet("source/opta_skills.parquet")
              latest <- df |> filter(season_end_year == max(season_end_year))
              if (nrow(latest) == 0) stop("Filter produced 0 rows -- aborting")
              write_parquet(latest, "blog/player-skills.parquet")
              cat(sprintf("Filtered to season %d: %d players\n", max(df$season_end_year), nrow(latest)))
            '
          else
            echo "::warning::opta_skills.parquet not available — player skills won't update"
          fi

      - name: Build match-shots (xG from enriched source)
        continue-on-error: true
        run: |
          if [ -f source/opta_shot_events.parquet ]; then
            Rscript -e '
              library(arrow); library(dplyr)
              source("scripts/league_config.R")
              shots <- read_parquet("source/opta_shot_events.parquet") |> filter(competition %in% BLOG_COMPS)
              has_xg <- "xg" %in% names(shots)
              cat("Source has xG:", has_xg, "\n")
              # Team names from lineups
              if (file.exists("source/opta_lineups.parquet")) {
                lu <- read_parquet("source/opta_lineups.parquet", col_select=c("match_id","player_id","team_id","team_name"))
                pt <- lu |> distinct(match_id, player_id, team_id, team_name) |> rename(lu_tid=team_id, lu_tn=team_name)
                shots <- shots |> left_join(pt, by=c("match_id","player_id"))
              }
              ms <- shots |> transmute(match_id,
                team_id = if ("lu_tid" %in% names(shots)) coalesce(team_id, lu_tid) else team_id,
                team_name = if ("lu_tn" %in% names(shots)) lu_tn else NA_character_,
                player_name, minute = as.integer(minute), second = as.integer(coalesce(second, 0)),
                x = round(x, 1), y = round(y, 1), type_id = as.integer(type_id),
                is_goal = type_id == 16L,
                xg = if (has_xg) round(xg, 3) else NA_real_) |>
                filter(!is.na(match_id)) |> arrange(match_id, minute, second)
              write_parquet(ms, "blog/match-shots.parquet")
              cat("match-shots:", nrow(ms), "shots", if(has_xg) "with xG" else "(no xG)", "\n")
            '
          else
            echo "::notice::Skipping match-shots — source file not available"
          fi

      - name: Build match-stats per league
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Download on-demand to reduce peak memory (247MB file)
          if gh release download opta-latest -p "opta_player_stats.parquet" -D source/; then
            Rscript scripts/rebuild_match_stats.R
            rm -f source/opta_player_stats.parquet  # free disk for chains
          else
            echo "::notice::Skipping match-stats — source file not available"
          fi

      - name: Build league xG from match-shots
        continue-on-error: true
        run: |
          if [ -f blog/match-shots.parquet ]; then
            Rscript -e '
              library(arrow); library(dplyr)
              source("scripts/league_config.R")
              ms <- read_parquet("blog/match-shots.parquet")
              if (!"xg" %in% names(ms) || all(is.na(ms$xg))) {
                cat("No xG in match-shots — skipping league-xg\n"); q()
              }
              # Read match-stats per league for match_id → league/season mapping
              codes <- BLOG_CODES
              meta <- list()
              for (code in codes) {
                f <- paste0("blog/match-stats-", code, ".parquet")
                if (file.exists(f)) {
                  meta[[code]] <- read_parquet(f, col_select=c("match_id","league","season")) |>
                    distinct(match_id, league, season)
                }
              }
              meta <- bind_rows(meta)
              tmx <- ms |> filter(!is.na(xg)) |> inner_join(meta, by="match_id") |>
                group_by(match_id, league, season, team_name) |>
                summarise(xgf=sum(xg, na.rm=TRUE), .groups="drop") |>
                group_by(match_id) |> mutate(xga=sum(xgf)-xgf) |> ungroup()
              lxg <- tmx |> group_by(league, season, team_name) |>
                summarise(matches=n(), xgf=round(sum(xgf),1), xga=round(sum(xga),1),
                  xgd=round(sum(xgf)-sum(xga),1), .groups="drop")
              latest <- lxg |> group_by(league) |> filter(season==max(season)) |>
                ungroup() |> arrange(league, desc(xgd))
              write_parquet(latest, "blog/league-xg.parquet")
              cat("league-xg:", nrow(latest), "rows from per-match xG\n")
            '
          else
            echo "::notice::Skipping league-xg — match-shots not available"
          fi

      - name: Enrich predictions with match-level xG
        continue-on-error: true
        run: |
          if [ -f blog/match-shots.parquet ] && [ -f blog/predictions.parquet ]; then
            Rscript -e '
              library(arrow); library(dplyr)
              source("scripts/league_config.R")
              ms <- read_parquet("blog/match-shots.parquet")
              if (!"xg" %in% names(ms) || all(is.na(ms$xg))) {
                cat("No xG in match-shots — skipping predictions enrichment\n"); q()
              }
              # Per-match, per-team xG totals
              team_xg <- ms |> filter(!is.na(xg)) |>
                group_by(match_id, team_id) |>
                summarise(xg = round(sum(xg, na.rm = TRUE), 2), .groups = "drop")
              # Get home/away from match-stats team_position
              codes <- BLOG_CODES
              pos <- list()
              for (code in codes) {
                f <- paste0("blog/match-stats-", code, ".parquet")
                if (file.exists(f)) {
                  pos[[code]] <- read_parquet(f, col_select = c("match_id","team_id","team_position")) |>
                    distinct(match_id, team_id, team_position)
                }
              }
              pos <- bind_rows(pos)
              # Pivot to one row per match: xg_home, xg_away
              match_xg <- team_xg |>
                inner_join(pos, by = c("match_id", "team_id")) |>
                filter(team_position %in% c("home", "away")) |>
                tidyr::pivot_wider(id_cols = match_id, names_from = team_position,
                  values_from = xg, names_prefix = "xg_")
              # Enrich predictions
              pred <- read_parquet("blog/predictions.parquet")
              pred_enriched <- pred |>
                left_join(match_xg |> select(match_id, xg_home, xg_away), by = "match_id")
              write_parquet(pred_enriched, "blog/predictions.parquet")
              n_xg <- sum(!is.na(pred_enriched$xg_home))
              cat("predictions enriched:", n_xg, "/", nrow(pred_enriched), "matches have xG\n")
            '
          else
            echo "::notice::Skipping predictions xG enrichment — required files not available"
          fi

      - name: Build chain parquets (one league at a time)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f source/opta_lineups.parquet ]; then
            Rscript scripts/build_chains_ci.R
          else
            echo "::notice::Skipping chains — lineups file not available"
          fi

      - name: Simulate domestic seasons
        continue-on-error: true
        run: |
          if [ -f blog/predictions.parquet ]; then
            Rscript scripts/simulate_season.R
          else
            echo "::notice::Skipping domestic simulations — predictions not available"
          fi

      - name: Simulate cup competitions (UCL/UEL/UECL)
        continue-on-error: true
        run: |
          if [ -f blog/predictions.parquet ]; then
            Rscript scripts/simulate_cup.R
          else
            echo "::notice::Skipping cup simulations — predictions not available"
          fi

      - name: Upload to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_R2_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install -g wrangler
          if ! ls blog/*.parquet 1>/dev/null 2>&1; then
            echo "ERROR: No parquet files found in blog/"
            exit 1
          fi
          upload_errors=0
          for f in blog/*.parquet; do
            if wrangler r2 object put "inthegame-data/football/$(basename $f)" --file "$f" --remote; then
              echo "Uploaded football/$(basename $f)"
            else
              echo "ERROR: Failed to upload football/$(basename $f)"
              upload_errors=$((upload_errors + 1))
            fi
          done
          if [ "$upload_errors" -gt 0 ]; then
            echo "ERROR: $upload_errors upload(s) failed"
            exit 1
          fi
