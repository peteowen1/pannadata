name: Rebuild Match Events

# Manual-dispatch only — backfill match_events for matches whose match_ids
# exist in opta_player_stats.parquet but are absent from per-league match_events
# files. Bypasses opta-manifest.parquet's "complete" flag (which the daily
# scrape's discovery layer trusts). See scripts/opta/REBUILD_EVENTS_DESIGN.md
# for the full design rationale.
#
# NEVER fires on schedule — every run is a deliberate operator decision because
# the script makes hundreds of Opta API calls per dispatch. Rate-limit budget
# is the user's to manage.

on:
  workflow_dispatch:
    inputs:
      competition:
        description: 'Competition code (single, e.g. "Bulgarian_First_League", "Championship")'
        required: true
        type: string
      season:
        description: 'Season label (e.g. "2025-2026")'
        required: true
        type: string
        default: '2025-2026'
      dry_run:
        description: 'Dry run only (lists match_ids to fetch, makes no API calls)'
        required: false
        type: boolean
        default: false
      max_matches:
        description: 'Cap on matches to fetch this run (rate-limit safety, blank = no cap)'
        required: false
        type: string
        default: ''
      run_consolidate:
        description: 'After rebuild, also run consolidate_opta.py + commit to opta-latest'
        required: false
        type: boolean
        default: true

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: write

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout pannadata
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/opta/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/opta/requirements.txt

      - name: Download opta_player_stats.parquet + per-league existing match_events
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data/opta/match_events/${{ inputs.competition }}
          mkdir -p data/opta/shot_events/${{ inputs.competition }}
          # Source of truth for which match_ids exist
          gh release download opta-latest --pattern "opta_player_stats.parquet" \
            --dir data/opta/
          # Existing per-league match_events (empty download is fine; the
          # rebuild script treats missing file as "0 matches present")
          gh release download opta-latest --pattern "match_events_${{ inputs.competition }}.parquet" \
            --dir data/opta/match_events/${{ inputs.competition }}/ 2>/dev/null || true
          ls -la data/opta/match_events/${{ inputs.competition }}/ || true
          # Existing event-less registry — pull so rebuild MERGES new event-less
          # match_ids into it rather than overwriting prior comps' entries.
          gh release download opta-latest --pattern "event_less_match_ids.parquet" \
            --dir data/opta/ 2>/dev/null || true

      - name: Run rebuild_events.py
        run: |
          cd scripts/opta
          ARGS="--player-stats ../../data/opta/opta_player_stats.parquet \
                --opta-dir ../../data/opta \
                --competition ${{ inputs.competition }} \
                --season ${{ inputs.season }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ inputs.max_matches }}" ]; then
            ARGS="$ARGS --max-matches ${{ inputs.max_matches }}"
          fi
          echo "Running: python rebuild_events.py $ARGS"
          python rebuild_events.py $ARGS

      - name: Consolidate + upload (if requested)
        if: inputs.run_consolidate == true && inputs.dry_run == false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd data
          # Force coverage check to pick up the new per-league rows
          OPTA_CONSOLIDATE_FORCE=1 python ../scripts/opta/consolidate_opta.py
          # Upload the affected per-league + consolidated files
          if [ -f opta/match_events/${{ inputs.competition }}/${{ inputs.season }}.parquet ]; then
            # The flat per-league match_events_<comp>.parquet gets written by
            # consolidate_events_by_league() to opta/events_consolidated/
            UP_FILE="opta/events_consolidated/events_${{ inputs.competition }}.parquet"
            if [ -f "$UP_FILE" ]; then
              gh release upload opta-latest "$UP_FILE" --repo peteowen1/pannadata --clobber
              echo "Uploaded $UP_FILE"
            fi
          fi
          # Upload the event-less registry if rebuild recorded any (matches Opta
          # has no event feed for) — the coverage check subtracts these.
          if [ -f opta/event_less_match_ids.parquet ]; then
            gh release upload opta-latest opta/event_less_match_ids.parquet --repo peteowen1/pannadata --clobber
            echo "Uploaded event_less_match_ids.parquet"
          fi

      - name: Job summary
        if: always()
        run: |
          {
            echo "## rebuild_events.py — ${{ inputs.competition }} / ${{ inputs.season }}"
            echo ""
            echo "- Dry run: \`${{ inputs.dry_run }}\`"
            echo "- Max matches: \`${{ inputs.max_matches }}\`"
            echo "- Consolidate: \`${{ inputs.run_consolidate }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
